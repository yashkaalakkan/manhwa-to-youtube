name: 🎬 Step 1 — Generate Videos

on:
  workflow_dispatch:
    inputs:
      manhwa_name:
        description: "Manhwa/Manga title (e.g. Solo Leveling)"
        required: true
        type: string
      episode_number:
        description: "Episode number (e.g. 1)"
        required: true
        type: string
      drive_file_link:
        description: "Public Google Drive link — Chapter 1 (required)"
        required: true
        type: string
      drive_file_link_2:
        description: "Chapter 2 Drive link (optional)"
        required: false
        default: ""
        type: string
      drive_file_link_3:
        description: "Chapter 3 Drive link (optional)"
        required: false
        default: ""
        type: string
      drive_file_link_4:
        description: "Chapter 4 Drive link (optional)"
        required: false
        default: ""
        type: string
      drive_file_link_5:
        description: "Chapter 5 Drive link (optional)"
        required: false
        default: ""
        type: string
      cover_image_link:
        description: "Public Drive link for cover image (optional)"
        required: false
        default: ""
        type: string
      language:
        description: "Subtitle/TTS language"
        required: false
        default: "en"
        type: choice
        options: [en, es, fr, de, ja, ko, pt, hi]
      skip_pages:
        description: "Pages to skip: 'auto' skips first + last 2 pages, or comma-separated numbers (e.g. 1,45,46)"
        required: false
        default: "auto"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-jpn \
            tesseract-ocr-kor \
            libgl1 \
            libglib2.0-0 \
            espeak-ng \
            libsndfile1 \
            fonts-noto \
            fonts-noto-cjk \
            imagemagick \
            poppler-utils

      - name: 📦 Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pdf2image pymupdf

      - name: ⬇️ Download Kokoro TTS model files
        run: |
          wget -q -O kokoro-v1.0.onnx \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
          wget -q -O voices-v1.0.bin \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
          echo "Kokoro models ready ✅"

      # ── Prepare each chapter (download → OCR → script → TTS) ────────────
      # Each chapter produces: 1 short script + audio + 1 full-ep chunk audio
      # No video is built here — all video building happens in the final step.

      - name: 📖 Prepare Chapter 1
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          bash .github/scripts/process_chapter.sh \
            "${{ github.event.inputs.manhwa_name }}" \
            "${{ github.event.inputs.episode_number }}" \
            "1" \
            "${{ github.event.inputs.drive_file_link }}" \
            "${{ github.event.inputs.cover_image_link }}" \
            "${{ github.event.inputs.language }}" \
            "${{ github.event.inputs.skip_pages }}"

      - name: 📖 Prepare Chapter 2
        if: ${{ github.event.inputs.drive_file_link_2 != '' }}
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          bash .github/scripts/process_chapter.sh \
            "${{ github.event.inputs.manhwa_name }}" \
            "${{ github.event.inputs.episode_number }}" \
            "2" \
            "${{ github.event.inputs.drive_file_link_2 }}" \
            "${{ github.event.inputs.cover_image_link }}" \
            "${{ github.event.inputs.language }}" \
            "${{ github.event.inputs.skip_pages }}"

      - name: 📖 Prepare Chapter 3
        if: ${{ github.event.inputs.drive_file_link_3 != '' }}
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          bash .github/scripts/process_chapter.sh \
            "${{ github.event.inputs.manhwa_name }}" \
            "${{ github.event.inputs.episode_number }}" \
            "3" \
            "${{ github.event.inputs.drive_file_link_3 }}" \
            "${{ github.event.inputs.cover_image_link }}" \
            "${{ github.event.inputs.language }}" \
            "${{ github.event.inputs.skip_pages }}"

      - name: 📖 Prepare Chapter 4
        if: ${{ github.event.inputs.drive_file_link_4 != '' }}
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          bash .github/scripts/process_chapter.sh \
            "${{ github.event.inputs.manhwa_name }}" \
            "${{ github.event.inputs.episode_number }}" \
            "4" \
            "${{ github.event.inputs.drive_file_link_4 }}" \
            "${{ github.event.inputs.cover_image_link }}" \
            "${{ github.event.inputs.language }}" \
            "${{ github.event.inputs.skip_pages }}"

      - name: 📖 Prepare Chapter 5
        if: ${{ github.event.inputs.drive_file_link_5 != '' }}
        env:
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: |
          bash .github/scripts/process_chapter.sh \
            "${{ github.event.inputs.manhwa_name }}" \
            "${{ github.event.inputs.episode_number }}" \
            "5" \
            "${{ github.event.inputs.drive_file_link_5 }}" \
            "${{ github.event.inputs.cover_image_link }}" \
            "${{ github.event.inputs.language }}" \
            "${{ github.event.inputs.skip_pages }}"

      # ── Build all videos ─────────────────────────────────────────────────
      # Shorts: 1 per chapter (portrait 1080x1920)
      # Full episode: all chapters combined (landscape 1920x1080)
      # Compilations: every 5 shorts concatenated

      - name: 🎬 Build videos
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          EP="${{ github.event.inputs.episode_number }}"
          MANHWA="${{ github.event.inputs.manhwa_name }}"
          LANG="${{ github.event.inputs.language }}"
          SHORTS_DIR="./output/shorts"
          mkdir -p "$SHORTS_DIR" ./output

          # Count how many chapters were actually processed
          CHAPTER_COUNT=0
          for ch in 1 2 3 4 5; do
            if [ -f "pipeline/ch${ch}/scripts.json" ]; then
              CHAPTER_COUNT=$ch
            fi
          done
          echo "Chapters processed: $CHAPTER_COUNT"

          # Build one short per chapter
          for ch in $(seq 1 $CHAPTER_COUNT); do
            echo "--- Building short for chapter $ch ---"
            python src/video/build_shorts.py \
              --pages-dir    "episode_pages_ch${ch}" \
              --audio-dir    "pipeline/ch${ch}/audio" \
              --scripts      "pipeline/ch${ch}/scripts.json" \
              --output-dir   "$SHORTS_DIR" \
              --manhwa       "$MANHWA" \
              --episode      "$EP" \
              --chapter      "$ch" \
              --manifest     "pipeline/ch${ch}/manifest.json"
          done

          # Build combined full episode
          echo "--- Building full episode ($CHAPTER_COUNT chapters combined) ---"
          python src/video/build_full_episode.py \
            --manhwa     "$MANHWA" \
            --episode    "$EP" \
            --output     "./output/full_episode_ep${EP}.mp4" \
            --shorts-dir "$SHORTS_DIR" \
            --chapters   "$CHAPTER_COUNT"

      - name: 💾 Commit series memory back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add series_memory/
          git diff --staged --quiet || git commit -m \
            "🧠 Memory: ${{ github.event.inputs.manhwa_name }} ep${{ github.event.inputs.episode_number }}"
          git push

      - name: 💾 Save shorts as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-ep${{ github.event.inputs.episode_number }}-preview
          path: output/shorts/
          retention-days: 3

      - name: 💾 Save all outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: episode-${{ github.event.inputs.episode_number }}-videos
          path: |
            pipeline/
            output/
          retention-days: 3